<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Контакти</title>

  <!-- 🔧 favicon fix -->
  <link rel="icon" href="data:,">

  <link rel="stylesheet" href="../styles/style.css">
  <link rel="stylesheet" href="../styles/responsive.css">
</head>

<body>

<header class="site-header">
  <nav>
    <a href="../index.html">Головна</a>
    <a href="about.html">Про мене</a>
    <a href="contact.html" class="active">Контакти</a>

    <!-- важно -->
    <button class="theme-toggle" type="button">Change theme</button>
  </nav>
</header>

<main class="container">

  <h1>Контакти</h1>

  <section class="card">
    <form id="contact-form" novalidate>

      <!-- NAME -->
      <div class="form-group">
        <label for="name">Ім’я:</label>
        <input 
          type="text" 
          id="name" 
          name="name" 
          required 
          autocomplete="name"
        >
        <small class="error"></small>
      </div>

      <!-- EMAIL -->
      <div class="form-group">
        <label for="email">Email:</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          required 
          autocomplete="email"
        >
        <small class="error"></small>
      </div>

      <!-- PHONE -->
      <div class="form-group">
        <label for="phone">Телефон:</label>
        <input 
          type="tel" 
          id="phone" 
          name="phone" 
          autocomplete="tel"
        >
        <small class="error"></small>
      </div>

      <!-- MESSAGE -->
      <div class="form-group">
        <label for="message">Повідомлення:</label>
        <textarea 
          id="message" 
          name="message" 
          rows="4" 
          required
        ></textarea>

        <small class="char-count">0 / 200</small>
        <small class="error"></small>
      </div>

      <button type="submit">Надіслати</button>

    </form>
  </section>

</main>

<footer>
  <p>© <span class="year"></span> Лещенко Дмитро</p>
</footer>

<script src="../js/main.js" defer></script>
</body>
</html>
